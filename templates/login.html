{% extends "base.html" %}

{% block title %}Iniciar sesión - Panel de Comisiones{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 40px auto;">
    <h2 style="margin-bottom: 10px;">Iniciar sesión</h2>
    <p style="color: #64748b; margin-bottom: 20px;">
        Ingresa tu usuario y contraseña para acceder.
    </p>

    <form method="POST">
        <div class="form-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Ingresar</button>
    </form>

    <div style="margin-top: 20px; text-align: center;">
        <a href="/olvide-contraseña" style="color: #1d4ed8; text-decoration: none; font-size: 14px;">¿Olvidaste tu contraseña?</a>
    </div>
</div>
{% endblock %}
