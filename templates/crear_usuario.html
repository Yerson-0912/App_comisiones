{% extends "base.html" %}

{% block title %}Crear Usuario - Panel de Comisiones{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto;">
    <h2 style="margin-bottom: 20px;">Crear Nuevo Usuario</h2>

    <form method="POST">
        <div class="form-group">
            <label for="username">Nombre de Usuario</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>
            <small style="color: #64748b; display: block; margin-top: 5px;">
                Mínimo 6 caracteres
            </small>
        </div>

        <div class="form-group">
            <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                <input type="checkbox" id="es_admin" name="es_admin">
                <span>Es Administrador</span>
            </label>
            <small style="color: #64748b; display: block; margin-top: 5px;">
                Los administradores pueden crear usuarios y gestionar la configuración
            </small>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">Crear Usuario</button>
            <a href="/configuracion" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
