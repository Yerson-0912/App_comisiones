{% extends "base.html" %}

{% block title %}Restablecer Contraseña - Panel de Comisiones{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <h2 style="margin-bottom: 20px;">Restablecer Contraseña</h2>

    <form method="POST">
        <input type="hidden" name="email" value="{{ email }}">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
            <label for="contraseña_nueva">Contraseña Nueva</label>
            <input type="password" id="contraseña_nueva" name="contraseña_nueva" required autocomplete="new-password">
            <small style="color: #64748b; display: block; margin-top: 5px;">
                Mínimo 6 caracteres
            </small>
        </div>

        <div class="form-group">
            <label for="confirmar_contraseña">Confirmar Contraseña</label>
            <input type="password" id="confirmar_contraseña" name="confirmar_contraseña" required autocomplete="new-password">
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">Restablecer Contraseña</button>
            <a href="/login" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
