{% extends "base.html" %}

{% block title %}Olvidé mi Contraseña - Panel de Comisiones{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 40px auto;">
    <h2 style="margin-bottom: 10px;">Recuperar Contraseña</h2>
    <p style="color: #64748b; margin-bottom: 20px;">
        Ingresa el email asociado a tu cuenta y te enviaremos un enlace para restablecer tu contraseña.
    </p>

    <form method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required autocomplete="email">
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">Enviar Enlace de Recuperación</button>
            <a href="/login" class="btn btn-secondary">Volver</a>
        </div>
    </form>
</div>
{% endblock %}
